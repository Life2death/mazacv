name: Scrape Jobs Pipeline

on:
  repository_dispatch:
    types: [scrape-request]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scraper/requirements.txt
      - run: python -m scraper.run --user-id "${{ github.event.client_payload.userId }}" --run-id "${{ github.event.client_payload.runId }}" --track PM
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          NAUKRI_COOKIE: ${{ secrets.NAUKRI_COOKIE }}
          FOUNDIT_COOKIE: ${{ secrets.FOUNDIT_COOKIE }}
          IIMJOBS_COOKIE: ${{ secrets.IIMJOBS_COOKIE }}
