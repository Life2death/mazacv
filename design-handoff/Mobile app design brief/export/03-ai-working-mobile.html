<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MazaCV · AI working (mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:40px;background:#e7e5df;font-family:Inter,sans-serif;}@keyframes rl-spin{to{transform:rotate(360deg);}}@keyframes rl-pulse{0%,100%{opacity:.45;}50%{opacity:1;}}</style>

<body>
<div style="box-shadow:0 14px 44px rgba(2,6,23,.16);border-radius:34px;"><div style="background:#f8fafc;border-radius:34px;overflow:hidden;width:373px;">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:11px 24px 5px;font:600 13px Inter;color:#0f172a;background:#fff;"><span>9:41</span><span style="display:inline-flex;align-items:center;gap:6px;"><span style="font-size:11px;">5G</span><span style="display:inline-block;width:22px;height:11px;border:1.5px solid #0f172a;border-radius:3px;position:relative;"><span style="position:absolute;inset:1.5px;width:65%;background:#0f172a;border-radius:1px;"></span></span></span></div>
            <div style="padding:60px 30px;text-align:center;">
              <div style="width:72px;height:72px;border-radius:20px;background:#fef3c7;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:34px;animation:rl-pulse 1.4s infinite;">✨</div>
              <div style="font:700 20px Poppins;color:#0f172a;margin-top:26px;">Apun ka AI kaam pe laga hai…</div>
              <div style="font:400 14px Inter;color:#64748b;margin-top:8px;">Tailoring your resume for this JD</div>
              <div style="margin-top:28px;display:flex;flex-direction:column;gap:12px;text-align:left;">
                <div style="display:flex;align-items:center;gap:10px;font:500 13px Inter;color:#16a34a;">✓ Missing keywords daal rahe hai</div>
                <div style="display:flex;align-items:center;gap:10px;font:500 13px Inter;color:#16a34a;">✓ Bullet points sharp kar rahe hai</div>
                <div style="display:flex;align-items:center;gap:10px;font:500 13px Inter;color:#4f46e5;"><span style="width:14px;height:14px;border:2.5px solid #c7d2fe;border-top-color:#4f46e5;border-radius:50%;animation:rl-spin .8s linear infinite;"></span> Summary likhi ja rahi hai…</div>
              </div>
            </div>
          </div></div>
