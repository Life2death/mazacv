<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MazaCV · Loaders & toasts</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box;}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:40px;background:#e7e5df;font-family:Inter,sans-serif;}@keyframes rl-spin{to{transform:rotate(360deg);}}@keyframes rl-pulse{0%,100%{opacity:.45;}50%{opacity:1;}}</style>
</head>
<body>
<div style="display:flex;flex-direction:column;gap:20px;max-width:380px;">
        
        <div style="background:#fff;border-radius:2px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:24px;display:flex;flex-direction:column;gap:20px;">
          <div style="display:flex;align-items:center;gap:14px;"><div style="width:38px;height:38px;border-radius:50%;border:4px solid #eef2ff;border-top-color:#4f46e5;animation:rl-spin 1s linear infinite;"></div><div><div style="font:600 14px Poppins;color:#0f172a;">Ruk, calculate kar raha hu… ⏳</div><div style="font:400 11px Inter;color:#94a3b8;">Scoring your resume</div></div></div>
          <div style="height:1px;background:#eef2f7;"></div>
          <div style="display:flex;align-items:center;gap:14px;"><div style="font-size:30px;animation:rl-pulse 1.4s infinite;">✨</div><div><div style="font:600 14px Poppins;color:#0f172a;">Apun ka AI kaam pe laga hai…</div><div style="font:400 11px Inter;color:#94a3b8;">Tailoring your resume</div></div></div>
          <div style="height:1px;background:#eef2f7;"></div>
          <div style="display:flex;align-items:center;gap:8px;"><span style="width:9px;height:9px;border-radius:50%;background:#4f46e5;animation:rl-pulse 1.2s infinite;"></span><span style="width:9px;height:9px;border-radius:50%;background:#4f46e5;animation:rl-pulse 1.2s infinite .2s;"></span><span style="width:9px;height:9px;border-radius:50%;background:#4f46e5;animation:rl-pulse 1.2s infinite .4s;"></span><span style="font:500 12px Inter;color:#94a3b8;margin-left:6px;">typing-dots loader</span></div>
        </div>

        <div style="font:600 12px Inter;color:#64748b;margin:24px 0 10px;">Toast / error styles</div>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <div style="background:#0f172a;border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 20px rgba(0,0,0,.2);"><span style="width:26px;height:26px;border-radius:50%;background:#16a34a;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;">✓</span><div style="font:600 13px Inter;color:#fff;">Ho gaya boss! Score upar gaya 📈</div></div>
          <div style="background:#fff;border:1px solid #fecaca;border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:12px;"><span style="width:26px;height:26px;border-radius:50%;background:#fee2e2;color:#dc2626;display:flex;align-items:center;justify-content:center;font-size:14px;">!</span><div><div style="font:600 13px Inter;color:#991b1b;">Arre, kuch locha ho gaya.</div><div style="font:400 11px Inter;color:#b91c1c;">Something went wrong — phirse try kar.</div></div></div>
          <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:13px;padding:14px 16px;display:flex;align-items:center;gap:12px;"><span style="font-size:16px;">⚠️</span><div style="font:500 13px Inter;color:#92400e;">File 5MB se choti honi chahiye, boss.</div></div>
        </div>
      </div>
</body>
</html>
